<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <g opacity="0.15" stroke="#22d3ee" stroke-width="1">
    <line x1="64" y1="120" x2="448" y2="120"/>
    <line x1="64" y1="200" x2="448" y2="200"/>
    <line x1="64" y1="280" x2="448" y2="280"/>
    <line x1="64" y1="360" x2="448" y2="360"/>
    <line x1="128" y1="80" x2="128" y2="400"/>
    <line x1="256" y1="80" x2="256" y2="400"/>
    <line x1="384" y1="80" x2="384" y2="400"/>
  </g>

  <g fill="url(#bars)">
    <rect x="96"  y="280" width="56" height="120" rx="6"/>
    <rect x="176" y="220" width="56" height="180" rx="6"/>
    <rect x="256" y="260" width="56" height="140" rx="6"/>
    <rect x="336" y="160" width="56" height="240" rx="6"/>
  </g>

  <g filter="url(#glow)">
    <polyline
      points="96,200 176,180 256,210 336,140 416,90"
      fill="none"
      stroke="url(#line)"
      stroke-width="14"
      stroke-linecap="round"
      stroke-linejoin="round"/>
    <circle cx="416" cy="90" r="14" fill="#a78bfa"/>
  </g>

  <g fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700">
    <text x="256" y="462" text-anchor="middle" font-size="44" letter-spacing="2">AI STOCKS</text>
  </g>
</svg>
